name: Test

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x
          cache: true

      - name: Restore
        run: dotnet restore
      
      - name: Copy appsettings
        run: cp appsettings-sample.json appsettings.json

      - name: Build
        run: dotnet build --configuration Release --no-restore

      - name: Test
        run: dotnet test tests/FusimAiAssiant.Tests/FusimAiAssiant.Tests.csproj --configuration Release --no-build --verbosity normal
